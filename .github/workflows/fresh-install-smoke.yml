name: Fresh Install Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/fresh-install-smoke.yml"
      - "1-install.bat"
      - "1-install.sh"
      - "2-start.bat"
      - "2-start.sh"
      - "3-update.bat"
      - "3-update.sh"
      - "pyproject.toml"
      - "requirements.txt"
      - "scripts/setup_models.py"
      - "scripts/ci_smoke.py"
      - "main.py"
      - "backend/**"
      - "ui/**"

jobs:
  smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      CORRIDORKEY_INSTALL_SAM2: y
      CORRIDORKEY_PREDOWNLOAD_SAM2: y
      CORRIDORKEY_INSTALL_GVM: n
      CORRIDORKEY_INSTALL_VIDEOMAMA: n
      CORRIDORKEY_CREATE_SHORTCUT: n

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ubuntu Qt runtime libraries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libpulse0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Run Windows installer
        if: runner.os == 'Windows'
        shell: cmd
        run: 1-install.bat

      - name: Run Unix installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x 1-install.sh
          ./1-install.sh

      - name: Check installed model status (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: .venv\Scripts\python.exe scripts\setup_models.py --check

      - name: Check installed model status (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: .venv/bin/python scripts/setup_models.py --check

      - name: Set up git branch for updater test
        shell: bash
        run: |
          git checkout -b main
          git branch --set-upstream-to=origin/main main 2>/dev/null || true

      - name: Run updater (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: cmd /V:ON /E:ON /C 3-update.bat

      - name: Run updater (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x 3-update.sh
          ./3-update.sh

      - name: Verify start script exists (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "2-start.bat" exit /b 1
          echo [OK] 2-start.bat present

      - name: Verify start script exists (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f 2-start.sh || exit 1
          echo "[OK] 2-start.sh present"

      - name: Headless startup smoke (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          CORRIDORKEY_SKIP_STARTUP_DIAGNOSTICS: "1"
          CORRIDORKEY_SKIP_UPDATE_CHECK: "1"
        run: .venv\Scripts\python.exe scripts\ci_smoke.py

      - name: Headless startup smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CORRIDORKEY_SKIP_STARTUP_DIAGNOSTICS: "1"
          CORRIDORKEY_SKIP_UPDATE_CHECK: "1"
        run: .venv/bin/python scripts/ci_smoke.py
